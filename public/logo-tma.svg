<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="arch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2e"/>
      <stop offset="50%" stop-color="#0a0a0d"/>
      <stop offset="100%" stop-color="#1a1a1f"/>
    </linearGradient>
    <linearGradient id="archHighlight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#d4a84b" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="flagBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e90ff"/>
      <stop offset="100%" stop-color="#42a1ff"/>
    </linearGradient>
    <linearGradient id="flagRed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e5344a"/>
      <stop offset="100%" stop-color="#c71d35"/>
    </linearGradient>
    <linearGradient id="flagOrange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f39d1e"/>
      <stop offset="100%" stop-color="#ff7a00"/>
    </linearGradient>
  </defs>

  <!-- Arch / mountain A shape, 3D metallic black -->
  <path d="M200 60 L340 300 L290 300 L200 150 L110 300 L60 300 Z"
        fill="url(#arch)" />
  <path d="M200 60 L340 300 L290 300 L200 150 L110 300 L60 300 Z"
        fill="url(#archHighlight)" />

  <!-- Stylized flag parallelogram under the arch -->
  <g transform="translate(115 195) skewX(-18)">
    <rect x="0" y="0"   width="160" height="22" fill="url(#flagBlue)"/>
    <rect x="0" y="22"  width="160" height="22" fill="url(#flagRed)"/>
    <rect x="0" y="44"  width="160" height="22" fill="url(#flagOrange)"/>
    <rect x="0" y="0"   width="160" height="66" fill="#ffffff" opacity="0.12"/>
  </g>
</svg>
